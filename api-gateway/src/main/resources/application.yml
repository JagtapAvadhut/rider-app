spring:
  application:
    name: api-gateway
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
  cloud:
    gateway:
      mvc:
        routes:
          - id: auth
            uri: ${AUTH_SERVICE_URL:http://auth-service:8081}
            predicates: [ Path=/auth/** ]
          - id: users
            uri: ${USER_SERVICE_URL:http://user-service:8082}
            predicates: [ Path=/users/** ]
          - id: drivers
            uri: ${DRIVER_SERVICE_URL:http://driver-service:8083}
            predicates: [ Path=/drivers/** ]
          - id: rides
            uri: ${RIDE_SERVICE_URL:http://ride-service:8084}
            predicates: [ Path=/rides/** ]
          - id: matching
            uri: ${MATCHING_SERVICE_URL:http://matching-service:8085}
            predicates: [ Path=/matching/** ]
          - id: pricing
            uri: ${PRICING_SERVICE_URL:http://pricing-service:8086}
            predicates: [ Path=/pricing/** ]
          - id: payments
            uri: ${PAYMENT_SERVICE_URL:http://payment-service:8087}
            predicates: [ Path=/payments/** ]
          - id: tracking
            uri: ${TRACKING_SERVICE_URL:http://tracking-service:8088}
            predicates: [ Path=/tracking/**,/ws/** ]
server:
  port: ${SERVER_PORT:8080}
management:
  endpoints:
    web:
      exposure:
        include: health,info
security:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
