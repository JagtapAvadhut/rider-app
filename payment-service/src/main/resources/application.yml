spring:
  application:
    name: payment-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:docker}
server:
  port: ${SERVER_PORT:8087}
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
security:
  jwt:
    secret: ${JWT_SECRET:01234567890123456789012345678901}
    ttl-seconds: ${JWT_TTL_SECONDS:3600}
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs
